<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NOVA Library</title>
  <style>
    :root{
      --bg:#07101a;
      --card:#0f1724;
      --muted:#9aa4b2;
      --accent:#1abc9c;
      --glass: rgba(255,255,255,0.03);
      --glass-2: rgba(255,255,255,0.02);
      --radius:12px;
      --max-width:1100px;
      --transition:200ms cubic-bezier(.2,.9,.3,1);
      --shadow: 0 6px 18px rgba(2,6,23,0.6);
      --text:#e6eef6;
    }

    html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;}
    body{background:linear-gradient(180deg,#07101a 0%, #07121b 60%);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:flex-start;justify-content:center;padding:36px 18px;}
    .wrap{width:100%;max-width:var(--max-width);}

    header.site-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#0fb5a0);display:flex;align-items:center;justify-content:center;font-weight:700;color:#042026;font-size:20px;box-shadow:var(--shadow);
    }
    .title{font-size:18px;font-weight:700;line-height:1;color:var(--text)}
    .subtitle{font-size:12px;color:var(--muted);margin-top:2px}

    .controls{display:flex;gap:10px;align-items:center}
    .search{display:flex;align-items:center;background:var(--glass);padding:8px;border-radius:10px;gap:8px;box-shadow:var(--shadow);min-width:320px}
    .search input{background:transparent;border:0;outline:0;color:var(--text);font-size:14px;width:100%}
    .btn{background:linear-gradient(90deg,var(--accent),#2ecc71);border:0;padding:8px 12px;border-radius:10px;color:#021617;font-weight:700;cursor:pointer;transition:transform var(--transition)}
    .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--text);font-weight:600}
    .btn:active{transform:translateY(1px)}

    .main{display:grid;grid-template-columns:1fr 320px;gap:18px}
    @media (max-width:980px){ .main{grid-template-columns:1fr} .sidebar{order:2} }

    .sidebar{background:var(--card);padding:14px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.65);height:fit-content}
    .sidebar h4{margin:0 0 8px 0;font-size:13px;color:var(--muted)}
    .cat-list{display:flex;flex-wrap:wrap;gap:8px}
    .cat-item{background:var(--glass-2);padding:8px 10px;border-radius:10px;font-size:13px;color:var(--text);cursor:pointer;border:1px solid transparent;transition:all var(--transition)}
    .cat-item.active{background:linear-gradient(90deg,#0f3b2f,#0b2f2a);border-color:rgba(255,255,255,0.04)}
    .cat-item:hover{transform:translateY(-3px)}

    .grid-controls{display:flex;gap:8px;align-items:center;margin:12px 0}
    .grid-toggle{display:flex;gap:6px}
    .grid-toggle button{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:8px;border-radius:8px;color:var(--muted);cursor:pointer}
    .grid-toggle button.active{background:var(--accent);color:#021617;border-color:transparent}

    .results{background:transparent;padding:6px;border-radius:12px;min-height:200px}
    .grid{display:grid;gap:12px;transition:all var(--transition)}
    .grid.list{grid-template-columns:1fr}
    .grid.compact{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
    .grid.large{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}

    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:12px;border-radius:12px;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--shadow);transition:transform var(--transition), box-shadow var(--transition)}
    .card:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(2,6,23,0.7)}
    .thumb{width:96px;height:96px;border-radius:10px;background:#07121b;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .meta{flex:1;min-width:0}
    .meta h3{margin:0;font-size:15px}
    .meta p{margin:6px 0 0 0;color:var(--muted);font-size:13px;line-height:1.35}
    .meta .tags{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
    .tag{background:rgba(255,255,255,0.03);padding:6px 8px;border-radius:8px;font-size:12px;color:var(--muted)}

    .card .actions{display:flex;gap:8px;align-items:center;margin-left:auto}
    .link-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:8px;border-radius:8px;color:var(--text);text-decoration:none;font-weight:700}

    .pager{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:18px}
    .pager button{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:8px 10px;border-radius:8px;color:var(--text);cursor:pointer}
    .pager .current{background:var(--accent);color:#021617;border-color:transparent}

    .empty{padding:40px;border-radius:12px;background:var(--card);text-align:center;color:var(--muted)}

    footer{margin-top:18px;text-align:center;color:var(--muted);font-size:13px}
    a.invite{color:var(--accent);font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <header class="site-header">
      <div class="brand">
        <div class="logo" id="logo">N</div>
        <div>
          <div class="title" id="siteTitle">NOVA Library</div>
          <div class="subtitle" id="siteSubtitle">NOVA — Nexus Of Verified Assets</div>
        </div>
      </div>

      <div class="controls">
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="opacity:.7"><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input id="searchInput" placeholder="Search packs, creators, tags..." />
          <button class="btn small" id="searchBtn">Search</button>
        </div>

        <div class="top-actions">
          <button class="btn secondary small" id="browseAll">Browse</button>
          <a class="btn small" id="discordInvite" href="https://discord.gg/ThgxvPtUjZ" target="_blank" rel="noopener">Join Server</a>
        </div>
      </div>
    </header>

    <main class="main">
      <section>
        <div class="results" id="resultsWrap">
          <div class="grid-controls">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="font-size:13px;color:var(--muted)">View</div>
              <div class="grid-toggle" id="gridToggle">
                <button data-view="list" title="List view">☰</button>
                <button data-view="compact" title="Compact grid">▦</button>
                <button data-view="large" title="Large grid">▦▦</button>
              </div>
            </div>

            <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
              <div style="font-size:13px;color:var(--muted)">Sort</div>
              <select id="sortSelect" style="background:transparent;border:1px solid rgba(255,255,255,0.04);padding:8px;border-radius:8px;color:var(--text)">
                <option value="new">Newest</option>
                <option value="popular">Most Shared</option>
                <option value="alpha">A → Z</option>
              </select>
            </div>
          </div>

          <div id="grid" class="grid compact" aria-live="polite"></div>

          <div class="pager" id="pager"></div>
        </div>
      </section>

      <aside class="sidebar">
        <h4>Categories</h4>
        <div class="cat-list" id="catList"></div>

        <div style="height:12px"></div>
        <h4>Quick Links</h4>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
          <a class="link-btn" href="https://nova-library.pages.dev/" target="_blank">Browse Full Library</a>
          <a class="link-btn" id="discordInvite2" href="https://discord.gg/ThgxvPtUjZ" target="_blank">Join NOVA Server</a>
          <a class="link-btn" href="https://github.com/Xameraman/nova-library" target="_blank">GitHub</a>
        </div>
      </aside>
    </main>

    <footer>
      <div id="footerText">Built with care • NOVA Library</div>
    </footer>
  </div>

  <script>
    // Configuration
    const SITE_TITLE = "NOVA Library";
    const SITE_SUBTITLE = "NOVA — Nexus Of Verified Assets";
    const INVITE_LINK = "https://discord.gg/ThgxvPtUjZ";
    const PACKS_JSON_URL = "https://raw.githubusercontent.com/Xameraman/nova-library/main/packs.json";
    const ITEMS_PER_PAGE = 10; // restored to original
    const DEFAULT_VIEW = "compact";
    const CATEGORY_ORDER = ["All","PvP","Utility","Furniture","Horror","Anime","Shader","Structure","Weapon","Bosses","Vehicle","Visual","Survival","Client","GUI & UI","Adventure","Minigame","Food","Environment","Addon","World","Animation","Skins"];

    const CATEGORY_COLORS = {
      'pvp':'#E74C3C','utility':'#95A5A6','furniture':'#8B4513','horror':'#2C3E50','anime':'#FF69B4',
      'shader':'#9B59B6','structure':'#D4AC0D','weapon':'#616A6B','bosses':'#922B21','vehicle':'#2980B9',
      'visual':'#1ABC9C','survival':'#27AE60','client':'#00E5FF','gui & ui':'#E67E22','adventure':'#F1C40F',
      'minigame':'#5DADE2','food':'#FF6347','environment':'#1E8449','addon':'#8E44AD','world':'#1A5276',
      'animation':'#FF1493','skins':'#F39C12'
    };

    // State
    let packs = [];
    let filtered = [];
    let currentPage = 1;
    let currentCategory = "All";
    let currentView = DEFAULT_VIEW;
    let currentQuery = "";
    let currentSort = "new";

    // DOM refs
    const siteTitleEl = document.getElementById('siteTitle');
    const siteSubtitleEl = document.getElementById('siteSubtitle');
    const discordInviteEls = [document.getElementById('discordInvite'), document.getElementById('discordInvite2')];
    const gridEl = document.getElementById('grid');
    const pagerEl = document.getElementById('pager');
    const catListEl = document.getElementById('catList');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const browseAllBtn = document.getElementById('browseAll');
    const gridToggle = document.getElementById('gridToggle');
    const sortSelect = document.getElementById('sortSelect');

    siteTitleEl.textContent = SITE_TITLE;
    siteSubtitleEl.textContent = SITE_SUBTITLE;
    discordInviteEls.forEach(el => { if (el) el.href = INVITE_LINK; });

    function renderCategories(){
      catListEl.innerHTML = "";
      CATEGORY_ORDER.forEach(cat => {
        const d = document.createElement('div');
        d.className = 'cat-item' + (cat === currentCategory ? ' active' : '');
        d.textContent = cat;
        d.dataset.val = cat;
        d.addEventListener('click', () => {
          currentCategory = cat;
          currentPage = 1;
          document.querySelectorAll('.cat-item').forEach(n => n.classList.remove('active'));
          d.classList.add('active');
          applyFilters();
        });
        catListEl.appendChild(d);
      });
    }

    async function fetchPacks(){
      try {
        const res = await fetch(PACKS_JSON_URL, {cache: "no-store"});
        if (!res.ok) throw new Error('Failed to fetch packs.json');
        const data = await res.json();
        packs = Array.isArray(data) ? data : (data.results || []);
        packs = packs.map(p => ({
          name: p.name || p.title || 'Untitled',
          description: p.description || p.desc || '',
          category: p.category || 'Uncategorized',
          credits: p.credits || p.author || p.added_by || 'Unknown',
          link: p.link || p.url || '',
          image: p.image || p.thumbnail || '',
          support: p.support || p.support_url || '',
          date_added: p.date_added || p.added_at || ''
        }));
        applyFilters();
      } catch (err) {
        console.error(err);
        gridEl.innerHTML = `<div class="empty">Unable to load library. Check your packs.json URL or network.</div>`;
      }
    }

    function applyFilters(){
      filtered = packs.filter(p => {
        if (currentCategory === "All") return true;
        return (p.category || '').toLowerCase() === currentCategory.toLowerCase();
      });

      if (currentQuery && currentQuery.trim().length){
        const q = currentQuery.toLowerCase();
        filtered = filtered.filter(p =>
          (p.name || '').toLowerCase().includes(q) ||
          (p.description || '').toLowerCase().includes(q) ||
          (p.credits || '').toLowerCase().includes(q)
        );
      }

      if (currentSort === 'new'){
        filtered.sort((a,b) => {
          const da = new Date(a.date_added || 0).getTime();
          const db = new Date(b.date_added || 0).getTime();
          return db - da;
        });
      } else if (currentSort === 'alpha'){
        filtered.sort((a,b) => (a.name||'').localeCompare(b.name||''));
      } else if (currentSort === 'popular'){
        filtered.sort((a,b) => {
          const sa = (a.support ? 1 : 0) + (a.image ? 1 : 0);
          const sb = (b.support ? 1 : 0) + (b.image ? 1 : 0);
          return sb - sa;
        });
      }

      renderPage();
    }

    function renderPage(){
      const total = filtered.length;
      const pages = Math.max(1, Math.ceil(total / ITEMS_PER_PAGE));
      if (currentPage > pages) currentPage = pages;

      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

      gridEl.className = 'grid ' + currentView;
      gridEl.innerHTML = '';
      if (!pageItems.length){
        gridEl.innerHTML = `<div class="empty">No packs found. Try a different category or search.</div>`;
      } else {
        pageItems.forEach(p => {
          const card = document.createElement('div');
          card.className = 'card';

          const thumb = document.createElement('div');
          thumb.className = 'thumb';
          if (p.image && isValidLink(p.image)){
            const img = document.createElement('img');
            img.src = p.image;
            img.alt = p.name;
            thumb.appendChild(img);
          } else {
            thumb.innerHTML = `<div style="padding:8px;color:var(--muted);font-size:12px;text-align:center">${p.name.slice(0,2).toUpperCase()}</div>`;
          }

          const meta = document.createElement('div');
          meta.className = 'meta';
          const h3 = document.createElement('h3');
          h3.textContent = p.name;
          const desc = document.createElement('p');
          desc.textContent = p.description || 'No description provided.';
          const tags = document.createElement('div');
          tags.className = 'tags';
          const tagCat = document.createElement('div');
          tagCat.className = 'tag';
          tagCat.textContent = p.category || 'Uncategorized';
          const tagAuthor = document.createElement('div');
          tagAuthor.className = 'tag';
          tagAuthor.textContent = `By ${p.credits || 'Unknown'}`;
          tags.appendChild(tagCat);
          tags.appendChild(tagAuthor);

          meta.appendChild(h3);
          meta.appendChild(desc);
          meta.appendChild(tags);

          const actions = document.createElement('div');
          actions.className = 'actions';

          if (isValidLink(p.link)){
            const a = document.createElement('a');
            a.className = 'link-btn';
            a.href = p.link;
            a.target = '_blank';
            a.rel = 'noopener';
            a.textContent = 'Get It';
            actions.appendChild(a);
          }

          if (isValidLink(p.support)){
            const s = document.createElement('a');
            s.className = 'link-btn';
            s.href = p.support;
            s.target = '_blank';
            s.rel = 'noopener';
            s.textContent = 'Support';
            actions.appendChild(s);
          }

          const color = CATEGORY_COLORS[(p.category||'').toLowerCase()] || '#0d1b2a';
          const accent = document.createElement('div');
          accent.style.width = '6px';
          accent.style.height = '100%';
          accent.style.borderRadius = '8px';
          accent.style.background = color;
          accent.style.marginRight = '8px';
          accent.style.flexShrink = '0';

          const left = document.createElement('div');
          left.style.display = 'flex';
          left.style.alignItems = 'flex-start';
          left.style.gap = '12px';
          left.appendChild(thumb);
          left.appendChild(meta);

          card.appendChild(accent);
          card.appendChild(left);
          card.appendChild(actions);

          gridEl.appendChild(card);
        });
      }

      renderPager(pages, total);
    }

    function renderPager(pages, total){
      pagerEl.innerHTML = '';
      if (pages <= 1) return;
      const prev = document.createElement('button');
      prev.textContent = 'Prev';
      prev.disabled = currentPage <= 1;
      prev.addEventListener('click', () => { currentPage--; renderPage(); });

      const next = document.createElement('button');
      next.textContent = 'Next';
      next.disabled = currentPage >= pages;
      next.addEventListener('click', () => { currentPage++; renderPage(); });

      pagerEl.appendChild(prev);

      const range = 3;
      const start = Math.max(1, currentPage - range);
      const end = Math.min(pages, currentPage + range);
      for (let i = start; i <= end; i++){
        const b = document.createElement('button');
        b.textContent = i;
        if (i === currentPage) b.classList.add('current');
        b.addEventListener('click', () => { currentPage = i; renderPage(); });
        pagerEl.appendChild(b);
      }

      pagerEl.appendChild(next);

      const info = document.createElement('div');
      info.style.marginLeft = '12px';
      info.style.color = 'var(--muted)';
      info.style.fontSize = '13px';
      info.textContent = `${total} packs • Page ${currentPage} of ${pages}`;
      pagerEl.appendChild(info);
    }

    function isValidLink(u){
      try { const url = new URL(u); return url.protocol === 'http:' || url.protocol === 'https:'; } catch { return false; }
    }

    searchBtn.addEventListener('click', () => {
      currentQuery = searchInput.value || '';
      currentPage = 1;
      applyFilters();
    });
    searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchBtn.click(); });

    browseAllBtn.addEventListener('click', () => {
      currentCategory = "All";
      document.querySelectorAll('.cat-item').forEach(n => n.classList.remove('active'));
      const el = document.querySelector('.cat-item[data-val="All"]');
      if (el) el.classList.add('active');
      currentPage = 1;
      applyFilters();
    });

    gridToggle.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        gridToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        renderPage();
      });
      if (btn.dataset.view === DEFAULT_VIEW) btn.classList.add('active');
    });

    sortSelect.addEventListener('change', () => {
      currentSort = sortSelect.value;
      applyFilters();
    });

    renderCategories();
    fetchPacks();

    document.addEventListener('keydown', (e) => {
      if (e.key === '/') { e.preventDefault(); searchInput.focus(); }
    });
  </script>
</body>
</html>
