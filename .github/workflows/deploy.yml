name: Deploy Nova Library

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Remove ALL files EXCEPT the ones we need for the website
      - name: Keep only website files
        run: |
          shopt -s extglob
          rm -rf !(index.html|nova-themes.js|.github|*.png|*.jpg|*.svg|*.ico)
          echo "Artifact will contain:"
          ls -la

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
